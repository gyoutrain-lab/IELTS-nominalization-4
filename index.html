<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mastery: 50 IELTS Band 9 Integrated Drill</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 900px; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #e1e1e1; }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .dropdown { width: 100%; padding: 14px; margin: 12px 0; border: 2px solid #3498db; border-radius: 8px; font-size: 16px; background: #fff; }
        button { background: #2c3e50; color: white; border: none; padding: 18px; width: 48%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; margin-top: 15px; }
        #output { margin-top: 25px; padding: 25px; background: #f0f7f4; border-radius: 8px; border-left: 6px solid #27ae60; display: none; font-size: 1.1em; line-height: 1.6; }
        .tts-btn { background: #8e44ad; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title">Band 9 Academic Master Drill (1/50)</h2>
    <p id="prompt"><strong>Prompt:</strong> Loading...</p>
    
    <label><b>Cause (Nominalization)</b></label>
    <select id="cause" class="dropdown"><option value="">-- Select --</option></select>
    
    <label><b>Academic Verbs (Cohesion Markers)</b></label>
    <select id="verb" class="dropdown"><option value="">-- Select --</option></select>
    
    <label><b>Effect (Nominalization)</b></label>
    <select id="effect" class="dropdown"><option value="">-- Select --</option></select>
    
    <button onclick="evaluateDrill()">Submit & Evaluate</button>
    <button style="background:#27ae60" onclick="nextCase()">Next Case &raquo;</button>
    
    <div id="output"></div>
    <button id="tts" class="tts-btn" onclick="speakResult()" style="display:none;">🔊 Listen to Sentence</button>
</div>

<script>
    const data = [
        { q: "Cars cause traffic.", causes: ["Driving cars", "Vehicle usage", "The proliferation of private motor vehicles"], verbs: ["makes", "causes", "exacerbates"], effects: ["bad traffic", "more congestion", "the intensification of urban traffic congestion"] },
        { q: "Studying abroad is good for students.", causes: ["Going overseas", "International education", "The pursuit of tertiary education in foreign jurisdictions"], verbs: ["helps", "improves", "facilitates"], effects: ["better jobs", "career growth", "the expansion of global career opportunities"] },
        { q: "Fast food causes obesity.", causes: ["Junk food intake", "Poor nutrition", "The habitual consumption of energy-dense processed sustenance"], verbs: ["leads to", "drives", "precipitates"], effects: ["getting fat", "weight gain", "the accelerated prevalence of metabolic disorders"] },
        { q: "Social media makes people lonely.", causes: ["Using social apps", "Online networking", "The pervasive utilization of digital networking platforms"], verbs: ["creates", "brings", "engenders"], effects: ["loneliness", "social isolation", "a profound exacerbation of social alienation"] },
        { q: "Robots take human jobs.", causes: ["Automation", "Robotic usage", "The widespread deployment of autonomous robotic systems"], verbs: ["destroys", "replaces", "necessitates the restructuring of"], effects: ["job loss", "unemployment", "the large-scale displacement of the traditional workforce"] },
        { q: "Tell me about your career goals.", causes: ["Working hard", "Career moves", "The pursuit of strategic professional development"], verbs: ["is", "leads to", "represents a milestone in"], effects: ["better pay", "getting ahead", "the realization of long-term career objectives"] },
        { q: "Why is lifelong learning important?", causes: ["Learning more", "Continuous study", "The commitment to perpetual intellectual growth"], verbs: ["helps", "develops", "is essential for"], effects: ["being smart", "staying ahead", "the maintenance of professional relevancy"] },
        { q: "Are internships necessary?", causes: ["Working while school", "Getting experience", "The acquisition of hands-on professional exposure"], verbs: ["helps", "improves", "serves as a catalyst for"], effects: ["get jobs", "career readiness", "the successful transition to the workforce"] },
        { q: "How do you manage stress?", causes: ["Relaxing", "Time management", "The implementation of structured stress-reduction protocols"], verbs: ["stops", "lowers", "substantially mitigates"], effects: ["feeling good", "better focus", "the restoration of psychological and physical equilibrium"] },
        { q: "Why study nursing?", causes: ["Helping patients", "Healthcare interest", "The dedication to clinical excellence and patient safety"], verbs: ["is", "drives", "is deeply rooted in"], effects: ["saves lives", "better health", "the profound commitment to improving patient welfare"] },
        { q: "Is leadership important?", causes: ["Being a boss", "Leading teams", "The cultivation of effective managerial and leadership aptitude"], verbs: ["builds", "guides", "is fundamental to"], effects: ["good teams", "success", "the optimization of organizational performance"] },
        { q: "Why learn new languages?", causes: ["Talking more", "Global communication", "The attainment of multilingual proficiency"], verbs: ["helps", "connects", "substantially facilitates"], effects: ["travel better", "meeting people", "the expansion of global professional networks"] },
        { q: "How has your field changed?", causes: ["New methods", "Industry trends", "The rapid evolution of contemporary clinical practices"], verbs: ["makes", "changes", "fundamentally transforms"], effects: ["modern work", "new standards", "the systemic integration of advanced medical technologies"] },
        { q: "What is your best skill?", causes: ["Being good at X", "Professional expertise", "The mastery of specialized technical competencies"], verbs: ["helps", "drives", "serves as a cornerstone of"], effects: ["doing well", "high quality", "the delivery of superior professional outcomes"] },
        { q: "Why join a professional body?", causes: ["Joining groups", "Professional networking", "The engagement in standardized professional associations"], verbs: ["is good", "supports", "is vital for"], effects: ["get support", "better status", "the adherence to rigorous ethical and professional standards"] },
        { q: "Is traditional media dying?", causes: ["Watching TV", "Legacy media usage", "The gradual decline of conventional broadcasting"], verbs: ["is fading", "is changing", "is being supplanted by"], effects: ["news online", "digital shift", "the comprehensive digital transformation of information"] },
        { q: "Does money equate to success?", causes: ["Having wealth", "Financial accumulation", "The attainment of significant fiscal prosperity"], verbs: ["means", "is seen as", "is viewed as"], effects: ["be successful", "good life", "a multifaceted indicator of individual societal achievement"] },
        { q: "Is work-life balance possible?", causes: ["Working hard", "Occupational pressure", "The challenge of managing professional obligations"], verbs: ["creates", "impacts", "necessitates"], effects: ["tired", "stress", "a delicate equilibrium between productivity and welfare"] },
        { q: "Is university education overrated?", causes: ["Going to college", "Academic degrees", "The prioritization of formal tertiary education"], verbs: ["is", "shows", "is often criticized as"], effects: ["get smart", "high costs", "a potential mismatch between academic training and market demand"] },
        { q: "Do you prefer city or country life?", causes: ["Living in towns", "Urban lifestyle", "The preference for high-density metropolitan environments"], verbs: ["is", "provides", "is characterized by"], effects: ["more fun", "good access", "a greater proximity to diverse professional and social amenities"] },
        { q: "Are parents too strict today?", causes: ["Raising kids", "Parental control", "The implementation of authoritative parenting styles"], verbs: ["makes", "affects", "frequently results in"], effects: ["kids cry", "less freedom", "the potential inhibition of adolescent autonomy and confidence"] },
        { q: "Is technology making us lazier?", causes: ["Using robots/apps", "Technological reliance", "The increasing dependence on automated digital solutions"], verbs: ["causes", "leads to", "is responsible for"], effects: ["less moving", "decreased effort", "a decline in physical and cognitive engagement"] },
        { q: "Should students wear uniforms?", causes: ["Wearing school clothes", "Uniform policies", "The enforcement of standardized institutional dress codes"], verbs: ["helps", "supports", "promotes"], effects: ["look clean", "less bullying", "the reduction of socioeconomic disparity among students"] },
        { q: "Is climate change a real threat?", causes: ["Heating planet", "Global warming", "The existential threat posed by shifting climatic patterns"], verbs: ["shows", "causes", "necessitates"], effects: ["bad weather", "danger", "a systemic transformation of global ecological safety"] },
        { q: "Do we travel enough?", causes: ["Taking trips", "International travel", "The consistent engagement in cross-cultural exploration"], verbs: ["helps", "opens", "is a catalyst for"], effects: ["see world", "broader views", "the development of cross-cultural empathy and awareness"] },
        { q: "Is space travel worth the cost?", causes: ["Spending on space", "Aerospace funding", "The allocation of capital to extraterrestrial exploration"], verbs: ["is", "uses", "diverts"], effects: ["new tech", "costs money", "the debate over resource allocation in terrestrial crises"] },
        { q: "Should art be taught in schools?", causes: ["Doing art/music", "Creative education", "The integration of artistic disciplines into school curricula"], verbs: ["builds", "fosters", "is pivotal for"], effects: ["think new", "creativity", "the development of innovative and lateral thought processes"] },
        { q: "Are sports stars paid too much?", causes: ["Paying athletes", "Sports salaries", "The exorbitant remuneration of elite professional athletes"], verbs: ["is", "reflects", "raises questions regarding"], effects: ["unfair", "high demand", "the profound disparity between sports and essential social services"] },
        { q: "Is online shopping the future?", causes: ["Buying via web", "E-commerce expansion", "The global proliferation of virtual retail marketplaces"], verbs: ["changes", "replaces", "is fundamentally altering"], effects: ["easy buying", "store closures", "the systemic restructuring of global supply chain logistics"] },
        { q: "Should we recycle more?", causes: ["Cleaning trash", "Waste management", "The systematic implementation of circular waste reduction"], verbs: ["helps", "lowers", "substantially mitigates"], effects: ["less trash", "cleaner earth", "the long-term preservation of finite natural resources"] },
        { q: "Is privacy a luxury today?", causes: ["Using the internet", "Data transparency", "The erosion of personal privacy in the digital age"], verbs: ["is", "highlights", "exacerbates"], effects: ["watched", "data loss", "the growing vulnerability of individual digital identity"] },
        { q: "Are movies better than books?", causes: ["Watching films", "Media consumption", "The preference for audio-visual storytelling mediums"], verbs: ["is", "offers", "provides"], effects: ["more fun", "visuals", "a more immediate, albeit less reflective, intellectual experience"] },
        { q: "Is friendship important for health?", causes: ["Having friends", "Social bonding", "The cultivation of supportive interpersonal relationships"], verbs: ["helps", "improves", "is correlated with"], effects: ["feel happy", "less stress", "a significant buffering effect against chronic psychological stress"] },
        { q: "Should politicians be scientists?", causes: ["Science in office", "Technocratic governance", "The integration of scientific expertise into policy formulation"], verbs: ["helps", "improves", "is essential for"], effects: ["better laws", "good data", "the delivery of evidence-based policy solutions"] },
        { q: "Do we rely too much on phones?", causes: ["Using smart devices", "Digital reliance", "The ubiquity of mobile communication technologies"], verbs: ["makes", "changes", "engenders"], effects: ["no focus", "loss of time", "a marked degradation in interpersonal communication quality"] },
        { q: "Is the fashion industry harmful?", causes: ["Buying new clothes", "Fast fashion", "The environmental toll of mass-market garment production"], verbs: ["causes", "leads to", "is responsible for"], effects: ["waste", "pollution", "the systemic depletion of natural resources and labor exploitation"] },
        { q: "Should we learn history?", causes: ["Reading the past", "Historical analysis", "The rigorous academic study of historical precedents"], verbs: ["helps", "explains", "is vital to"], effects: ["see errors", "better decisions", "the informed navigation of contemporary societal challenges"] },
        { q: "Is public transport efficient?", causes: ["Using trains/buses", "Public transit", "The strategic investment in urban public transportation"], verbs: ["helps", "lowers", "substantially optimizes"], effects: ["less traffic", "clean air", "the reduction of carbon-intensive personal vehicle reliance"] },
        { q: "Do we work too many hours?", causes: ["Laboring late", "Chronic overwork", "The prevalence of excessive professional labor hours"], verbs: ["causes", "leads to", "precipitates"], effects: ["burnout", "tired", "the comprehensive depletion of human physiological vitality"] },
        { q: "Is local food better?", causes: ["Buying local", "Regional produce", "The preference for domestically sourced food items"], verbs: ["helps", "bolsters", "is superior for"], effects: ["help farmers", "fresh food", "the revitalization of local agrarian economic stability"] },
        { q: "Are robots safe?", causes: ["Using machines", "AI integration", "The widespread adoption of autonomous robotic agents"], verbs: ["raises", "poses", "necessitates"], effects: ["fear", "risk", "the significant ethical and security implications for society"] },
        { q: "Is exercise a priority?", causes: ["Working out", "Physical fitness", "The dedication to structured physical exercise regimens"], verbs: ["helps", "improves", "is fundamental to"], effects: ["good body", "health", "the optimization of long-term physiological functioning"] },
        { q: "Do we need more green space?", causes: ["Building parks", "Urban greening", "The preservation of vegetative spaces within cities"], verbs: ["helps", "cleans", "is essential to"], effects: ["fresh air", "calm", "the mitigation of urban heat and atmospheric pollution"] },
        { q: "Should we ban junk food?", causes: ["Restricting snacks", "Nutritional policy", "The implementation of legislative bans on unhealthy food"], verbs: ["helps", "lowers", "is aimed at"], effects: ["less fat", "healthy kids", "the reduction of public health burdens related to obesity"] },
        { q: "Is self-study effective?", causes: ["Learning alone", "Autonomous study", "The adoption of self-directed pedagogical strategies"], verbs: ["helps", "develops", "serves as a catalyst for"], effects: ["more gains", "self-growth", "the cultivation of cognitive independence and discipline"] },
        { q: "Is the internet a library?", causes: ["Using search engines", "Digital data", "The comprehensive utilization of global digital databases"], verbs: ["is", "serves as", "is increasingly viewed as"], effects: ["fast facts", "learning", "an unprecedented democratization of information access"] },
        { q: "Should we pay for water?", causes: ["Water pricing", "Resource valuation", "The implementation of market-based pricing for water"], verbs: ["helps", "manages", "is necessary for"], effects: ["less waste", "better care", "the responsible management of finite natural resources"] },
        { q: "Do celebrities influence us?", causes: ["Watching famous people", "Celebrity culture", "The pervasive impact of media personalities on public opinion"], verbs: ["is", "shapes", "profoundly influences"], effects: ["follow them", "new trends", "the shaping of societal values and consumer behaviors"] },
        { q: "Is music a universal language?", causes: ["Hearing melodies", "Musical expression", "The capacity of music to transcend cultural boundaries"], verbs: ["connects", "unites", "acts as a medium for"], effects: ["feel closer", "no barrier", "the facilitation of cross-cultural emotional resonance"] },
        { q: "Are we losing our traditions?", causes: ["Changing ways", "Cultural dilution", "The gradual erosion of traditional cultural practices"], verbs: ["is", "reflects", "is indicative of"], effects: ["loss of past", "forgotten roots", "a potential alienation from collective ancestral identity"] },
        { q: "Should we work from home?", causes: ["Telecommuting", "Virtual work", "The widespread transition to remote professional models"], verbs: ["changes", "impacts", "necessitates"], effects: ["more time", "less travel", "the fundamental reconfiguration of labor-site logistics"] },
        { q: "Is optimism good for success?", causes: ["Being positive", "Optimistic outlook", "The adoption of a positive psychological disposition"], verbs: ["helps", "fuels", "serves as a driver for"], effects: ["do better", "stay strong", "the persistence required for achievement of difficult goals"] },
        { q: "Are zoos good for animals?", causes: ["Visiting zoos", "Animal captivity", "The ethical implications of animal confinement for display"], verbs: ["raises", "sparks", "is a subject of"], effects: ["learn about life", "save species", "a contentious debate on sentient welfare and conservation"] },
        { q: "Should we learn from failures?", causes: ["Having bad times", "Failure analysis", "The systematic evaluation of past failures as learning opportunities"], verbs: ["helps", "builds", "is essential to"], effects: ["better future", "smart path", "the transformation of setbacks into constructive growth"] },
        { q: "Is the future bright?", causes: ["Hope for years", "Future outlook", "The anticipation of sustained human and technological progress"], verbs: ["is", "seems", "is grounded in"], effects: ["more good", "success", "the potential for continued advancement and societal well-being"] }

    // Auto-filler to complete the 50 cases dynamically
    for(let i=6; i<=50; i++) {
        data.push({ q: `Discussion Prompt ${i}`, causes: ["Basic idea", "Formal concept", "The analytical scope of..."], verbs: ["relates to", "highlights", "substantiates the claim that"], effects: ["simple result", "clear outcome", "a profound systemic implication for society"] });
    }

    let current = 0;
    function init() {
        document.getElementById('title').innerText = `Band 9 Mastery (${current + 1}/${data.length})`;
        document.getElementById('prompt').innerHTML = `<strong>Prompt:</strong> ${data[current].q}`;
        ['cause', 'verb', 'effect'].forEach(id => {
            document.getElementById(id).innerHTML = '<option value="">-- Please Select --</option>' + data[current][id + 's'].map((opt, i) => `<option value="${i}">${opt}</option>`).join('');
        });
        document.getElementById('output').style.display = 'none';
        document.getElementById('tts').style.display = 'none';
    }

    function evaluateDrill() {
        const c = document.getElementById('cause').value, v = document.getElementById('verb').value, e = document.getElementById('effect').value;
        const out = document.getElementById('output');
        if(c==="" || v==="" || e==="") { out.style.display = 'block'; out.innerHTML = "<strong>Score: N/A</strong> - Please select all options."; return; }
        let score = (parseInt(c) + parseInt(v) + parseInt(e));
        let band = (score === 6) ? "9.0" : (score >= 4) ? "8.0" : "6.5";
        out.style.display = 'block';
        out.innerHTML = `<strong>Estimated Band: ${band}</strong><br><em>"${data[current].causes[c]} ${data[current].verbs[v]} ${data[current].effects[e]}."</em>`;
        document.getElementById('tts').style.display = 'block';
    }

    function speakResult() {
        const text = `${data[current].causes[document.getElementById('cause').value]} ${data[current].verbs[document.getElementById('verb').value]} ${data[current].effects[document.getElementById('effect').value]}.`;
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
    }
    function nextCase() { current = (current + 1) % data.length; init(); }
    init();
</script>
</body>
</html>
